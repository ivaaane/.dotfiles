[colors]
rosewater = #f5e0dc
flamingo = #f2cdcd
pink = #f5c2e7
mauve = #cba6f7
red = #f38ba8
maroon = #eba0ac
peach = #fab387
yellow = #f9e2af
green = #a6e3a1
teal = #94e2d5
sky = #89dceb
sapphire = #74c7ec
blue = #89b4fa
lavender = #b4befe
text = #cdd6f4
subtext1 = #bac2de
subtext0 = #a6adc8
overlay2 = #9399b2
overlay1 = #7f849c
overlay0 = #6c7086
surface2 = #585b70
surface1 = #45475a
surface0 = #313244
base = #1e1e2e
mantle = #181825
crust = #11111b
transparent = #FF00000

[bar/example]
width = 100%
height = 25pt
background = ${colors.base}
foreground = ${colors.pink}

bottom = true
module-margin = 0
border-size = 0
padding = 2

font-0 = Source Code Pro Semibold:size=10
font-1 = 0xProto Nerd Font Mono:size=10

modules-left = xworkspaces date
modules-center = window
modules-right = pulseaudio battery wlan

enable-ipc = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/i3
workspace-show-empty = true
workspace-max = 4
format = <label-state>
label-focused = " "
label-unfocused = " "

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = " "
format-volume = <label-volume>
label-volume = %percentage%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected =  %essid%

[module/date]
type = internal/date
interval = 5
date = %H:%M %A %B %d
label = %date%

[module/battery]
type = internal/battery
interval = 5

battery = BAT0
adapter = AC0

format-charging = 󰂄 <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = 󱟢 <label-full>

ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁻
ramp-capacity-2 = 󰁽
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰂂

[module/window]
type = internal/xwindow
format = <label>
label-empty = 
label-maxlen = 50

[settings]
screenchange-reload = true
