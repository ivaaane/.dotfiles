[colors]
base = #1d2021
fore = #ebdbb2
black = #665c54
red = #fb4934
green = #98971a
yellow = #d79921
blue = #458588
purple = #b16286
aqua = #689d6a
white = #a89984

[bar/example]
width = 100%
height = 15pt
background = ${colors.base}
foreground = ${colors.fore}

bottom = false
module-margin = 2
border-size = 0
padding = 0
line-size = 0

font-0 = JetBrains Mono Medium:size=8
font-1 = 0xProto Nerd Font Mono:size=10

separator = "|"

modules-left = xworkspaces
modules-right = date battery pulseaudio backlight wlan

enable-ipc = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/i3
workspace-show-empty = true
workspace-max = 10
label-focused-foreground = ${colors.base}
label-focused-background = ${colors.yellow}
label-unfocused-background = ${colors.base}
label-unfocused-foreground = ${colors.yellow}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "󰕾 "
format-volume = <label-volume>
label-volume = %percentage%%
margin = 5
format-volume-foreground = ${colors.green}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected =  disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = 󰖩 %essid%
format-connected-foreground = ${colors.purple}
format-disconnected-foreground = ${colors.purple}

[module/date]
type = internal/date
interval = 10
date = %H:%M
label =  %date%
format-foreground = ${colors.red}

[module/battery]
type = internal/battery
interval = 5
format-charging-foreground = ${colors.yellow}
format-discharging-foreground = ${colors.yellow}
format-full-foreground = ${colors.yellow}
battery = BAT0
adapter = AC0
format-charging = " <label-charging>"
format-discharging = " <label-discharging>"
format-full = " <label-full>"

[module/backlight]
type = internal/backlight
format = 󰃞 <label>
label = %percentage%%
format-foreground = ${colors.aqua}

[settings]
screenchange-reload = true
