[colors]
base = #1d2021
fore = #ebdbb2
black = #665c54
red = #cc241d
green = #98971a
yellow = #d79921
blue = #458588
purple = #b16286
aqua = #689d6a
white = #a89984

[bar/example]
width = 100%
height = 25pt
background = ${colors.base}
foreground = ${colors.fore}

bottom = true
module-margin = 1
border-size = 0
padding = 3
line-size = 4

font-0 = Source Code Pro Semibold:size=10
font-1 = 0xProto Nerd Font Mono:size=10

modules-left = xworkspaces date
modules-center = window
modules-right = backlight pulseaudio battery wlan

enable-ipc = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/i3
workspace-show-empty = true
workspace-max = 4
format = <label-state>
label-focused = " "
label-unfocused = " "
format-foreground = ${colors.green}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "󰕾 "
format-volume = <label-volume>
label-volume = %percentage%%
margin = 5
format-volume-underline = ${colors.red}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected =  disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = 󰖩 %essid%
format-connected-underline = ${colors.aqua}
format-disconnected-underline = ${colors.aqua}

[module/date]
type = internal/date
interval = 5
date = %H:%M %A %B %d
label = %date%
format-underline = #98971a

[module/battery]
type = internal/battery
interval = 5
format-charging-underline = ${colors.yellow}
format-discharging-underline = ${colors.yellow}
format-full-underline = ${colors.yellow}
battery = BAT0
adapter = AC0
format-charging = " <label-charging>"
format-discharging = " <label-discharging>"
format-full = " <label-full>"

[module/window]
type = internal/xwindow
format = <label>
label-empty = 
label-maxlen = 50

[module/backlight]
type = internal/backlight
format = 󰃞 <label>
label = %percentage%%
format-underline = ${colors.white}

[settings]
screenchange-reload = true
