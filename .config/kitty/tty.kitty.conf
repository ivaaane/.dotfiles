# Stuff #
enable_audio_bell		no
cursor_shape			block
allow_remote_control	yes
listen_on               unix:/tmp/kitty
confirm_os_window_close 0
cursor_trail            1

# Map #
map ctrl+d              clear_terminal scroll active

# Fonts #
font_family			    Perfect DOS VGA 437
symbol_map			    U+F1900-U+F19FF nasin-nanpa
bold_font        	    auto
italic_font         	auto
bold_italic_font 	    auto
font_size 10.0

# Color #
